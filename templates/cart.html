{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    background: url("{% static 'images/loginbackground.png' %}"), #000;
    background-size: cover;
    background-position: center;
    font-family: 'Open Sans', sans-serif;
  }

  .cart-container {
    width: 100%;
    max-width: 800px;
    background-color: rgba(255, 255, 255, 0.9);
    border-radius: 10px;
    padding: 30px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  h2 {
    font-size: 2rem;
    color: #000;
    margin-bottom: 20px;
    text-align: center;
  }

  .cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    padding: 10px;
    background-color: rgba(255, 255, 255, 0.8);
    border-radius: 5px;
    box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
  }

  .cart-item strong {
    font-size: 1.1rem;
    color: #333;
  }

  .cart-item a {
    color: #ff4d4d;
    text-decoration: none;
    font-weight: 600;
  }

  .cart-item a:hover {
    text-decoration: underline;
  }

  .empty-cart {
    text-align: center;
    color: #ff4d4d;
    font-size: 1.2rem;
    font-weight: 600;
  }

  .checkout-btn {
    display: block;
    width: 100%;
    background-color: #3066b7;
    color: #fff;
    font-size: 1.2rem;
    padding: 15px;
    margin-top: 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    text-align: center;
    transition: background-color 0.3s ease;
  }

  .checkout-btn:hover {
    background-color: #ff6600;
  }

  @media screen and (max-width: 480px) {
    .cart-container {
      padding: 15px;
    }

    h2 {
      font-size: 1.5rem;
    }

    .cart-item {
      flex-direction: column;
      align-items: flex-start;
    }

    .checkout-btn {
      padding: 12px;
    }
  }
</style>

<div class="cart-container">
  <h2>Your Cart</h2>

  {% for item in cart_items %}
    <div class="cart-item">
      <strong>{{ item.product.name }}</strong> - Quantity: {{ item.quantity }}
      <a href="{% url 'remove_from_cart' item.id %}">Remove</a>
    </div>
  {% empty %}
    <p class="empty-cart">Your cart is empty.</p>
  {% endfor %}

  {% if cart_items %}
    <a href="{% url 'checkout' %}" class="checkout-btn">Proceed to Checkout</a>
  {% endif %}
</div>

{% endblock %}
