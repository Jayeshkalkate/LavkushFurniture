{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
  body {
    background: url("{% static 'images/wishlist-background.jpg' %}"), #f0f0f0;
    background-size: cover;
    background-position: center;
    font-family: 'Open Sans', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .wishlist-container {
    max-width: 800px;
    width: 100%;
    background: rgba(255, 255, 255, 0.8);
    border-radius: 12px;
    padding: 40px;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    text-align: center;
  }

  .wishlist-container h2 {
    font-size: 2rem;
    color: #3066b7;
    margin-bottom: 20px;
  }

  .wishlist-container .item {
    display: flex;
    flex-direction: column;
    margin: 20px 0;
    padding: 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background-color: #fff;
    transition: all 0.3s ease;
  }

  .wishlist-container .item:hover {
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    transform: translateY(-5px);
  }

  .wishlist-container .item strong {
    font-size: 1.5rem;
    color: #000;
  }

  .wishlist-container .item p {
    font-size: 1rem;
    color: #555;
    margin: 10px 0;
  }

  .wishlist-container .item a {
    font-size: 1rem;
    color: #ff4d4d;
    text-decoration: none;
    font-weight: 600;
    margin-top: 10px;
  }

  .wishlist-container .item a:hover {
    text-decoration: underline;
    color: #d91d1d;
  }

  .wishlist-container .empty-message {
    font-size: 1.2rem;
    color: #555;
    margin-top: 20px;
  }

  @media screen and (max-width: 600px) {
    .wishlist-container {
      padding: 30px;
    }

    .wishlist-container h2 {
      font-size: 1.5rem;
    }

    .wishlist-container .item {
      padding: 10px;
    }

    .wishlist-container .item strong {
      font-size: 1.2rem;
    }

    .wishlist-container .item p {
      font-size: 0.9rem;
    }
  }
</style>

<div class="wishlist-container">
  <h2>Your Wishlist</h2>

  {% for item in wishlist_items %}
    <div class="item">
      <strong>{{ item.product.name }}</strong> - {{ item.product.price }}
      <p>{{ item.product.description }}</p>
      <a href="{% url 'remove_from_wishlist' item.id %}">Remove</a>
    </div>
  {% empty %}
    <p class="empty-message">Your wishlist is empty.</p>
  {% endfor %}
</div>

{% endblock %}
